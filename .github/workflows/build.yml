name: CI

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set active Xcode path
        run: |
          XCODE_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
          sudo xcode-select -s /Applications/Xcode_$XCODE_VERSION.app/Contents/Developer

      - name: Create canonical source directory
        run: |
          sudo mkdir -p /Users/Shared
          cp -R "$GITHUB_WORKSPACE" /Users/Shared/telegram-ios

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: /private/var/tmp/_bazel_containerhost
          key: ${{ runner.os }}-bazel-${{ hashFiles('WORKSPACE', 'Makefile') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Build
        run: |
          SOURCE_DIR=/Users/Shared/telegram-ios
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"
          cd "$SOURCE_DIR"

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"
          APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          COMMIT_COUNT=$(git rev-list --count HEAD)
          BUILD_NUMBER=$(( COMMIT_COUNT + BUILD_NUMBER_OFFSET ))

          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "APP_VERSION=$APP_VERSION"   >> "$GITHUB_ENV"

          python3 build-system/Make/ImportCertificates.py \
            --path build-system/fake-codesigning/certs

          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=arm64-simulator \
            --buildNumber="$BUILD_NUMBER"

      - name: Find and prepare IPA
        run: |
          SOURCE_DIR=/Users/Shared/telegram-ios
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"
          OUTPUT_PATH="$SOURCE_DIR/build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"
          
          echo "=== Searching IPA ==="
          IPA_FILE=$(find "$SOURCE_DIR" "$BAZEL_USER_ROOT" /private/var/tmp \
            -name "*.ipa" 2>/dev/null | head -n 1)
          
          echo "=== Searching APP ==="
          APP_PATH=$(find "$SOURCE_DIR" "$BAZEL_USER_ROOT" \
            -type d -name "Telegram.app" 2>/dev/null | head -n 1)
          
          if [ -n "$IPA_FILE" ]; then
            echo "IPA found: $IPA_FILE"
            cp "$IPA_FILE" "$OUTPUT_PATH/Telegram.ipa"
          fi
          
          if [ -n "$APP_PATH" ]; then
            echo "APP found: $APP_PATH"
            cp -R "$APP_PATH" "$OUTPUT_PATH/Telegram.app"
          
            if [ ! -f "$OUTPUT_PATH/Telegram.ipa" ]; then
              echo "Creating IPA from .app"
              PAYLOAD_DIR="$(mktemp -d)/Payload"
              mkdir -p "$PAYLOAD_DIR"
              cp -R "$APP_PATH" "$PAYLOAD_DIR/"
              cd "$(dirname "$PAYLOAD_DIR")"
              zip -r "$OUTPUT_PATH/Telegram.ipa" Payload
            fi
          fi
          
          if [ ! -f "$OUTPUT_PATH/Telegram.ipa" ]; then
            echo "ERROR: Nothing built"
            exit 1
          fi
          
          echo "=== Result ==="
          ls -lh "$OUTPUT_PATH"

          echo "Zipping .app"
          if [ -d "$OUTPUT_PATH/Telegram.app" ]; then
            cd "$OUTPUT_PATH"
            zip -r Telegram.app.zip Telegram.app
          fi

      - name: Create GitHub Release and upload IPA
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.BUILD_NUMBER }}
          name: Telegram ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          body: |
            Automated build #${{ env.BUILD_NUMBER }}
            App version: ${{ env.APP_VERSION }}
          draft: false
          prerelease: false
          files: |
            /Users/Shared/telegram-ios/build/artifacts/Telegram.ipa
            /Users/Shared/telegram-ios/build/artifacts/Telegram.app.zip
